<section class="survey-list">
  <div class="survey-list__controls">
    <div class="survey-list__tabs">
      <button class="survey-list__tab" [class.survey-list__tab--active]="activeTab === 'active'" (click)="activeTab = 'active'">
        Active survey
      </button>
      <button class="survey-list__tab" [class.survey-list__tab--active]="activeTab === 'past'" (click)="activeTab = 'past'">
        Past survey
      </button>
    </div>
    <button class="survey-list__sort">
      Sort by categories ▼
    </button>
  </div>

  <div class="survey-list__grid">
    @for (survey of surveyService.activeSurveys(); track survey.title) {
      <div class="survey-list__card">
        <span class="survey-list__category">{{ survey.category }}</span>
        <h3 class="survey-list__title">{{ survey.title }}</h3>
        <span class="survey-list__badge">Ends in {{ survey.endDate | date:'dd.MM.yyyy' }} </span>
      </div>
    }
  </div>
</section>
